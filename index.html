<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Thailand EV Map</title>
    
    <!-- นำเข้าฟอนต์ Chakra Petch จาก Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

    <!-- MapLibre & Deck.gl -->
    <link href="https://unpkg.com/maplibre-gl@3.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.0.0/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
    
    <!-- PapaParse สำหรับอ่านไฟล์ CSV จาก Google Sheets -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        /* ตั้งค่าฟอนต์หลัก */
        body { margin: 0; padding: 0; font-family: 'Chakra Petch', sans-serif; overflow: hidden; }
        #map { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* แผงควบคุม */
        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 20, 0.85);
            color: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 320px;
            max-height: 90vh;
            overflow-y: auto;
            z-index: 10;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .control-panel h2 { margin-top: 0; font-size: 1.5rem; color: #4CAF50; font-weight: 600; }

        .stat-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 15px; }
        .stat-box h3 { margin: 0; font-size: 2rem; color: #00bcd4; font-weight: 700;}
        .stat-box p { margin: 5px 0 0 0; font-size: 1rem; opacity: 0.8; }
        
        ul.top-list { list-style: none; padding: 0; margin: 0; }
        ul.top-list li {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 1rem;
        }
        ul.top-list li:last-child { border-bottom: none; }
        
        /* ป้ายกำกับตอน Hover */
        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            pointer-events: none;
            display: none;
            z-index: 20;
            transform: translate(-50%, -100%);
            margin-top: -15px;
            border: 1px solid #4CAF50;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-family: 'Chakra Petch', sans-serif;
        }

        #loading { font-weight: bold; color: #00bcd4; text-align: center; padding: 20px 0; font-size: 1.2rem;}

        /* ปุ่ม Zoom */
        .zoom-controls {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .zoom-btn {
            background: rgba(20, 20, 20, 0.85);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            width: 40px;
            height: 40px;
            border-radius: 8px;
            font-size: 24px;
            font-family: monospace;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            transition: all 0.2s;
        }
        .zoom-btn:hover { background: #00bcd4; color: #000; border-color: #00bcd4; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="tooltip"></div>

    <div class="control-panel">
        <h2>🚗 แผนที่ความหนาแน่น EV</h2>
        <div id="loading">⏳ กำลังดึงข้อมูล...</div>
        <div id="dashboard" style="display: none;">
            <div class="stat-box">
                <h3 id="total-ev">0</h3>
                <p>จำนวนรถรวมทั่วประเทศ</p>
            </div>
            <h3 style="margin: 10px 0; font-size: 1.1rem; color: #aaa;">Top 10 จังหวัด</h3>
            <ul class="top-list" id="top10-list"></ul>
        </div>
    </div>

    <!-- ปุ่มควบคุมซูมแผนที่ -->
    <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomMap(1)">+</button>
        <button class="zoom-btn" onclick="zoomMap(-1)">−</button>
    </div>

    <script>
        const {DeckGL, HexagonLayer, TextLayer} = deck;
        let deckgl;
        
        // ตัวแปรเก็บค่ามุมมองปัจจุบัน
        let currentViewState = {
            longitude: 100.9925,
            latitude: 15.8700,
            zoom: 5.5,
            pitch: 50,
            bearing: 0,
            minZoom: 4,
            maxZoom: 15
        };

        // ลิงก์จาก Google Sheets 
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS5MfesntFAPpBUsYgUtFZaWnDyt4fbZNpKgp5EkHcr-ir3Q_PuV8O3wIjvG5f88Gt_J0YVaQ1fmacL/pub?gid=117754427&single=true&output=csv";

        function initMap() {
            deckgl = new DeckGL({
                container: 'map',
                mapStyle: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
                initialViewState: currentViewState,
                controller: true, 
                onViewStateChange: ({viewState}) => {
                    currentViewState = viewState; 
                },
                layers: []
            });
            fetchDataFromGoogleSheets();
        }

        // ระบบ Zoom
        function zoomMap(step) {
            const newZoom = Math.min(currentViewState.maxZoom, Math.max(currentViewState.minZoom, currentViewState.zoom + step));
            deckgl.setProps({
                viewState: {
                    ...currentViewState,
                    zoom: newZoom,
                    transitionDuration: 300 
                }
            });
            currentViewState.zoom = newZoom;
        }

        // ดึงข้อมูลผ่าน PapaParse
        function fetchDataFromGoogleSheets() {
            Papa.parse(GOOGLE_SHEET_CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    document.getElementById('loading').style.display = 'none';
                    updateMapAndDashboard(results.data);
                }
            });
        }

        // จำลองจุดข้อมูลแบบ Gaussian 
        function generateClusterPoints(centerLng, centerLat, evCount, provinceName) {
            const points = [];
            const numPoints = Math.min(Math.ceil(evCount / 50), 2000); 
            
            for (let i = 0; i < numPoints; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.pow(Math.random(), 2) * 0.3; 
                points.push({
                    position: [centerLng + radius * Math.cos(angle), centerLat + radius * Math.sin(angle)],
                    province: provinceName
                });
            }
            return points;
        }

        function updateMapAndDashboard(data) {
            let totalEV = 0;
            const originalData = []; 
            const scatterPoints = []; 

            data.forEach(row => {
                const count = parseInt(row.EV_Count);
                const lng = parseFloat(row.Lng);
                const lat = parseFloat(row.Lat);
                const provinceName = row.Province_TH || row.Province;

                if (!isNaN(count) && !isNaN(lng) && !isNaN(lat)) {
                    totalEV += count;
                    originalData.push({ province: provinceName, position: [lng, lat], weight: count });
                    const clustered = generateClusterPoints(lng, lat, count, provinceName);
                    scatterPoints.push(...clustered);
                }
            });

            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('total-ev').innerText = totalEV.toLocaleString();

            const top10 = [...originalData].sort((a, b) => b.weight - a.weight).slice(0, 10);
            const top10List = document.getElementById('top10-list');
            top10List.innerHTML = ''; 
            top10.forEach((item, index) => {
                const li = document.createElement('li');
                const color = index < 3 ? '#00bcd4' : '#fff';
                li.innerHTML = `<span style="color: ${color};">${index + 1}. ${item.province}</span> <strong>${item.weight.toLocaleString()}</strong>`;
                top10List.appendChild(li);
            });

            const hexLayer = new HexagonLayer({
                id: 'ev-hexagon-layer',
                data: scatterPoints,
                pickable: true,
                extruded: true,
                radius: 8000, 
                elevationScale: 50,
                getPosition: d => d.position,
                colorRange: [
                    [20, 40, 80],
                    [34, 94, 168],
                    [65, 182, 196],
                    [161, 218, 180],
                    [255, 255, 204],
                    [255, 100, 50] 
                ],
                onHover: ({object, x, y}) => {
                    const tooltip = document.getElementById('tooltip');
                    if (object && object.points && object.points.length > 0) {
                        tooltip.style.display = 'block';
                        tooltip.style.left = x + 'px';
                        tooltip.style.top = y + 'px';
                        const prov = object.points[0].province;
                        const density = object.points.length * 50; 
                        tooltip.innerHTML = `<strong>พื้นที่จังหวัด ${prov}</strong><br/>ประมาณการในรัศมีนี้: ~${density.toLocaleString()} คัน`;
                    } else {
                        tooltip.style.display = 'none';
                    }
                }
            });

            const textLayer = new TextLayer({
                id: 'text-layer',
                data: originalData,
                pickable: false,
                getPosition: d => d.position,
                getText: d => `${d.province}\n${d.weight.toLocaleString()}`,
                getSize: 15,
                getColor: [255, 255, 255, 240],
                getAngle: 0,
                getTextAnchor: 'middle',
                getAlignmentBaseline: 'center',
                fontFamily: "'Chakra Petch', sans-serif",
                fontWeight: 'bold',
                getPixelOffset: [0, -35],
                characterSet: 'auto' // บังคับสร้าง Texture อักษรไทยป้องกันบั๊กกล่องสี่เหลี่ยม
            });

            deckgl.setProps({ layers: [hexLayer, textLayer] });
        }

        window.onload = initMap;

    </script>
</body>
</html>
