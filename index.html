<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thailand EV Map (Google Sheets Sync)</title>
    
    <!-- MapLibre & Deck.gl -->
    <link href="https://unpkg.com/maplibre-gl@3.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.0.0/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
    
    <!-- PapaParse สำหรับอ่านไฟล์ CSV จาก URL -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        #map { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* สไตล์กล่องควบคุม */
        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 320px;
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        .control-panel h2 { margin-top: 0; font-size: 1.4rem; color: #1a73e8; }

        .stat-box { background: #333; color: white; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 15px; }
        .stat-box h3 { margin: 0; font-size: 1.8rem; color: #4CAF50;}
        .stat-box p { margin: 5px 0 0 0; font-size: 0.9rem; opacity: 0.9; }
        
        ul.top-list { list-style: none; padding: 0; margin: 0; }
        ul.top-list li {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.95rem;
        }
        ul.top-list li:last-child { border-bottom: none; }
        
        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            z-index: 20;
            transform: translate(-50%, -100%);
            margin-top: -10px;
        }

        /* อนิเมชันโหลดข้อมูล */
        #loading {
            font-weight: bold;
            color: #ff9800;
            text-align: center;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="tooltip"></div>

    <div class="control-panel">
        <h2>🚗 สถิติรถ EV ประเทศไทย</h2>
        
        <div id="loading">⏳ กำลังดึงข้อมูลจาก Google Sheets...</div>

        <div id="dashboard" style="display: none;">
            <div class="stat-box">
                <h3 id="total-ev">0</h3>
                <p>จำนวนรถรวมทั่วประเทศ</p>
            </div>
            
            <h3 style="margin: 10px 0; font-size: 1rem;">Top 5 จังหวัด (ยอดจดทะเบียนสูงสุด)</h3>
            <ul class="top-list" id="top5-list"></ul>
        </div>
    </div>

    <script>
        const {DeckGL, HexagonLayer} = deck;
        let deckgl;

        // URL ของ Google Sheets ที่ Publish เป็น CSV
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS5MfesntFAPpBUsYgUtFZaWnDyt4fbZNpKgp5EkHcr-ir3Q_PuV8O3wIjvG5f88Gt_J0YVaQ1fmacL/pub?gid=117754427&single=true&output=csv";

        // เริ่มต้นแผนที่เปล่าๆ
        function initMap() {
            deckgl = new DeckGL({
                container: 'map',
                mapStyle: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
                initialViewState: {
                    longitude: 100.9925,
                    latitude: 15.8700,
                    zoom: 5.2,
                    pitch: 45,
                    bearing: 0
                },
                controller: true,
                layers: []
            });

            // พอโหลดแผนที่เสร็จ ให้เริ่มดึงข้อมูลจาก Google Sheets ทันที
            fetchDataFromGoogleSheets();
        }

        function fetchDataFromGoogleSheets() {
            Papa.parse(GOOGLE_SHEET_CSV_URL, {
                download: true, // สั่งให้ดาวน์โหลดจาก URL
                header: true,   // ให้อ่านแถวแรกเป็นชื่อคอลัมน์
                skipEmptyLines: true,
                complete: function(results) {
                    console.log("ดึงข้อมูลสำเร็จ:", results.data);
                    
                    // ปิดข้อความโหลดข้อมูล
                    document.getElementById('loading').style.display = 'none';
                    
                    updateMapAndDashboard(results.data);
                },
                error: function(err) {
                    document.getElementById('loading').innerText = "❌ เกิดข้อผิดพลาดในการดึงข้อมูล";
                    document.getElementById('loading').style.color = "red";
                    console.error("PapaParse Error:", err);
                }
            });
        }

        // ฟังก์ชันประมวลผลข้อมูลและวาดลงแผนที่
        function updateMapAndDashboard(data) {
            let totalEV = 0;
            const mapData = [];

            // ทำความสะอาดและแปลงข้อมูล
            data.forEach(row => {
                const count = parseInt(row.EV_Count);
                const lng = parseFloat(row.Lng);
                const lat = parseFloat(row.Lat);
                
                // ใช้ชื่อจังหวัดภาษาไทย (ถ้ามี) ถ้าไม่มีให้ใช้ภาษาอังกฤษ
                const provinceName = row.Province_TH || row.Province;

                if (!isNaN(count) && !isNaN(lng) && !isNaN(lat)) {
                    totalEV += count;
                    mapData.push({
                        province: provinceName,
                        position: [lng, lat],
                        weight: count
                    });
                }
            });

            // อัปเดต Overlay Dashboard
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('total-ev').innerText = totalEV.toLocaleString();

            // จัดเรียงหา Top 5
            const top5 = [...mapData].sort((a, b) => b.weight - a.weight).slice(0, 5);
            const top5List = document.getElementById('top5-list');
            top5List.innerHTML = ''; 
            
            top5.forEach((item, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${index + 1}. ${item.province}</span> <strong>${item.weight.toLocaleString()}</strong>`;
                top5List.appendChild(li);
            });

            // สร้าง Hexagon Layer
            const hexLayer = new HexagonLayer({
                id: 'ev-hexagon-layer',
                data: mapData,
                pickable: true,
                extruded: true,
                radius: 25000, 
                elevationScale: 100, 
                getPosition: d => d.position,
                getColorWeight: d => d.weight,
                getElevationWeight: d => d.weight,
                colorRange: [
                    [255, 255, 178],
                    [254, 204, 92],
                    [253, 141, 60],
                    [240, 59, 32],
                    [189, 0, 38]
                ],
                onHover: ({object, x, y}) => {
                    const tooltip = document.getElementById('tooltip');
                    if (object) {
                        tooltip.style.display = 'block';
                        tooltip.style.left = x + 'px';
                        tooltip.style.top = y + 'px';
                        // ดึงชื่อจังหวัดจากข้อมูลที่อยู่ใน Hexagon นัั้นๆ (จุดแรก)
                        const prov = object.points[0].source.province;
                        tooltip.innerHTML = `<strong>${prov}</strong><br/>รถ EV: ${object.colorValue.toLocaleString()} คัน`;
                    } else {
                        tooltip.style.display = 'none';
                    }
                }
            });

            // สั่งอัปเดตเลเยอร์บน Deck.gl
            deckgl.setProps({ layers: [hexLayer] });
        }

        // เรียกใช้งานแผนที่ตอนโหลดเว็บเสร็จ
        window.onload = initMap;

    </script>
</body>
</html>
