<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Thailand EV Map</title>
    
    <!-- MapLibre & Deck.gl -->
    <link href="https://unpkg.com/maplibre-gl@3.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.0.0/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
    
    <!-- PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        #map { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 20, 0.85); /* ปรับให้เข้ากับ Dark Mode */
            color: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 320px;
            z-index: 10;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .control-panel h2 { margin-top: 0; font-size: 1.4rem; color: #4CAF50; }

        .stat-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 15px; }
        .stat-box h3 { margin: 0; font-size: 1.8rem; color: #00bcd4;}
        .stat-box p { margin: 5px 0 0 0; font-size: 0.9rem; opacity: 0.8; }
        
        ul.top-list { list-style: none; padding: 0; margin: 0; }
        ul.top-list li {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 0.95rem;
        }
        ul.top-list li:last-child { border-bottom: none; }
        
        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 13px;
            pointer-events: none;
            display: none;
            z-index: 20;
            transform: translate(-50%, -100%);
            margin-top: -15px;
            border: 1px solid #4CAF50;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #loading { font-weight: bold; color: #00bcd4; text-align: center; padding: 20px 0; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="tooltip"></div>

    <div class="control-panel">
        <h2>🚗 แผนที่ความหนาแน่น EV</h2>
        <div id="loading">⏳ กำลังดึงข้อมูล...</div>
        <div id="dashboard" style="display: none;">
            <div class="stat-box">
                <h3 id="total-ev">0</h3>
                <p>จำนวนรถรวมทั่วประเทศ</p>
            </div>
            <h3 style="margin: 10px 0; font-size: 1rem; color: #aaa;">Top 5 จังหวัด</h3>
            <ul class="top-list" id="top5-list"></ul>
        </div>
    </div>

    <script>
        const {DeckGL, HexagonLayer, TextLayer} = deck;
        let deckgl;

        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS5MfesntFAPpBUsYgUtFZaWnDyt4fbZNpKgp5EkHcr-ir3Q_PuV8O3wIjvG5f88Gt_J0YVaQ1fmacL/pub?gid=117754427&single=true&output=csv";

        function initMap() {
            deckgl = new DeckGL({
                container: 'map',
                mapStyle: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
                initialViewState: {
                    longitude: 100.9925,
                    latitude: 15.8700,
                    zoom: 5.5,
                    pitch: 50,
                    bearing: 0
                },
                controller: true,
                layers: []
            });
            fetchDataFromGoogleSheets();
        }

        function fetchDataFromGoogleSheets() {
            Papa.parse(GOOGLE_SHEET_CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    document.getElementById('loading').style.display = 'none';
                    updateMapAndDashboard(results.data);
                }
            });
        }

        // ฟังก์ชันสร้างจุดกระจายตัวแบบ Gaussian/Radial เพื่อให้เกิด Heatmap Effect ตรงกลาง
        function generateClusterPoints(centerLng, centerLat, evCount, provinceName) {
            const points = [];
            // ลดสเกลจำนวนจุดลงเพื่อไม่ให้เบราว์เซอร์ทำงานหนักเกินไป (1 จุด = รถ EV 50 คัน)
            const numPoints = Math.min(Math.ceil(evCount / 50), 2000); 
            
            for (let i = 0; i < numPoints; i++) {
                const angle = Math.random() * Math.PI * 2;
                // ใช้ Math.random() ยกกำลังเพื่อดึงจุดให้กระจุกตัวตรงกลาง (รัศมีประมาณ 0.3 องศา หรือ ~30km)
                const radius = Math.pow(Math.random(), 2) * 0.3; 
                points.push({
                    position: [centerLng + radius * Math.cos(angle), centerLat + radius * Math.sin(angle)],
                    province: provinceName
                });
            }
            return points;
        }

        function updateMapAndDashboard(data) {
            let totalEV = 0;
            const originalData = []; // สำหรับ TextLayer และ Dashboard
            const scatterPoints = []; // สำหรับ HexagonLayer

            data.forEach(row => {
                const count = parseInt(row.EV_Count);
                const lng = parseFloat(row.Lng);
                const lat = parseFloat(row.Lat);
                const provinceName = row.Province_TH || row.Province;

                if (!isNaN(count) && !isNaN(lng) && !isNaN(lat)) {
                    totalEV += count;
                    originalData.push({ province: provinceName, position: [lng, lat], weight: count });
                    
                    // สร้างจุดจำลองกระจายรอบๆ เพื่อสร้าง Heatmap
                    const clustered = generateClusterPoints(lng, lat, count, provinceName);
                    scatterPoints.push(...clustered);
                }
            });

            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('total-ev').innerText = totalEV.toLocaleString();

            const top5 = [...originalData].sort((a, b) => b.weight - a.weight).slice(0, 5);
            const top5List = document.getElementById('top5-list');
            top5List.innerHTML = ''; 
            top5.forEach((item, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${index + 1}. ${item.province}</span> <strong>${item.weight.toLocaleString()}</strong>`;
                top5List.appendChild(li);
            });

            // 1. เลเยอร์ Hexagon (ปรับรัศมีเล็กลงเพื่อให้ดูละเอียดขึ้น)
            const hexLayer = new HexagonLayer({
                id: 'ev-hexagon-layer',
                data: scatterPoints,
                pickable: true,
                extruded: true,
                radius: 8000, // ปรับให้เล็กลง (8 กิโลเมตร) 
                elevationScale: 50,
                getPosition: d => d.position,
                colorRange: [
                    [20, 40, 80],
                    [34, 94, 168],
                    [65, 182, 196],
                    [161, 218, 180],
                    [255, 255, 204],
                    [255, 100, 50] // สียอดแหลมสุด (หนาแน่นสุด)
                ],
                onHover: ({object, x, y}) => {
                    const tooltip = document.getElementById('tooltip');
                    if (object && object.points.length > 0) {
                        tooltip.style.display = 'block';
                        tooltip.style.left = x + 'px';
                        tooltip.style.top = y + 'px';
                        const prov = object.points[0].source.province;
                        // คำนวณความหนาแน่นใน Hexagon ช่องนี้
                        const density = object.points.length * 50; 
                        tooltip.innerHTML = `<strong>พื้นที่จังหวัด ${prov}</strong><br/>ประมาณการในรัศมีนี้: ~${density.toLocaleString()} คัน`;
                    } else {
                        tooltip.style.display = 'none';
                    }
                }
            });

            // 2. เลเยอร์ Text (ป้ายกำกับชื่อจังหวัดและจำนวน)
            const textLayer = new TextLayer({
                id: 'text-layer',
                data: originalData,
                pickable: false,
                getPosition: d => d.position,
                getText: d => `${d.province}\n${d.weight.toLocaleString()}`,
                getSize: 14,
                getColor: [255, 255, 255, 220],
                getAngle: 0,
                getTextAnchor: 'middle',
                getAlignmentBaseline: 'center',
                fontFamily: 'Tahoma, sans-serif',
                fontWeight: 'bold',
                // ดันข้อความให้ลอยขึ้นมาเหนือแผนที่ 3D
                getPixelOffset: [0, -30] 
            });

            deckgl.setProps({ layers: [hexLayer, textLayer] });
        }

        window.onload = initMap;

    </script>
</body>
</html>
